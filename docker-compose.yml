services:
  db:
    image: postgres:16
    container_name: db-container
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: a16zero
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d a16zero"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:latest
    container_name: redis-container
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    container_name: api-container
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: npm run start:dev 
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/node_modules   
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    container_name: worker-container
    build:
      context: ./backend
    command: npm run worker:dev  # you define this in package.json
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata: